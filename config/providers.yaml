# Per-role LLM routing across providers. Switch providers/models here with NO code changes.
# Stage 3 uses the "planner" role. "fast" and "embeddings" are for later stages.
#
# toolCalling:
#   native -> use the provider's built-in function/tool calling (OpenAI, Claude, gpt-oss)
#   json   -> model emits a strict JSON action we parse (for models without tool support, e.g. Gemma)

roles:
  planner:
    provider: ollama        # openai | claude | ollama
    mode: cloud             # ollama only: local | cloud
    model: gemma4:31b
    toolCalling: json       # Gemma has no native tool calling -> use JSON fallback
    temperature: 0.4

  fast:
    provider: ollama
    mode: cloud
    model: gemma4:31b
    toolCalling: json

  embeddings:
    provider: openai
    model: text-embedding-3-small

providers:
  openai:
    apiKeyEnv: OPENAI_API_KEY
    # baseUrl: https://api.openai.com/v1   # optional override

  claude:
    apiKeyEnv: ANTHROPIC_API_KEY

  ollama:
    local:
      baseUrl: http://localhost:11434
    cloud:
      baseUrl: https://ollama.com
      apiKeyEnv: OLLAMA_API_KEY
